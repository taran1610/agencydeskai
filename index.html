<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f1ea" />
    <meta
      name="description"
      content="AI that does insurance operations work for brokers. Reads ACORDs, loss runs, and dec pages, summarizes client files, prepares CRM updates, and flags missing forms — so brokers can manage more clients with less manual work."
    />
    <link rel="canonical" href="__SITE_URL__/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>AgencyDesk AI — AI operations for insurance brokers</title>

    <!-- Open Graph (Facebook, LinkedIn, iMessage) -->
    <meta property="og:site_name" content="AgencyDesk AI" />
    <meta property="og:title" content="AgencyDesk AI — AI operations for insurance brokers" />
    <meta
      property="og:description"
      content="AI that does insurance operations work for brokers. Reads ACORDs, loss runs, and dec pages, summarizes client files, prepares CRM updates, and flags missing forms — so brokers can manage more clients with less manual work."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AgencyDesk AI — AI operations for insurance brokers" />
    <meta
      name="twitter:description"
      content="AI that does insurance operations work for brokers. Reads ACORDs, loss runs, and dec pages, summarizes client files, prepares CRM updates, and flags missing forms."
    />
    <meta name="twitter:image" content="__OG_IMAGE__" />
    <meta name="twitter:url" content="__SITE_URL__/" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "AgencyDesk AI",
        "url": "__SITE_URL__/",
        "applicationCategory": "BusinessApplication",
        "description": "AI that does insurance operations work for brokers. Reads ACORDs, loss runs, and dec pages, summarizes client files, prepares CRM updates, and flags missing forms — so brokers can manage more clients with less manual work.",
        "offers": {
          "@type": "Offer",
          "availability": "https://schema.org/PreOrder",
          "description": "Private beta access"
        }
      }
    </script>

    <!-- Netlify static form discovery (hidden, picked up at build time) -->
    <form name="waitlist" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="role" />
      <input type="text" name="source" />
    </form>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
